# Production on the same VM as staging. Distinct service name and data dir avoid conflicts.
# Server IP is taken from base config (deploy.yml); set via SERVER_IP in repo or CI secret.

service: crm-app-production

proxy:
  host: crm.whizystems.com
  app_port: 3000
  ssl: true
  forward_headers: true
  healthcheck:
    path: /
    interval: 5
    timeout: 5

# Separate Postgres data dir and host port so production does not clash with staging on the same VM.
accessories:
  postgres:
    port: '127.0.0.1:5433:5432'
    directories:
      - postgres-production-data:/var/lib/postgresql/data
